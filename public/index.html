<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Auth Studio - Login</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=Space+Grotesk:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body data-page="login">
    <div class="bg-grid"></div>
    <div class="bg-orb orb-a"></div>
    <div class="bg-orb orb-b"></div>

    <main class="page">
      <section class="panel two">
        <div class="card hero">
          <p class="eyebrow">Auth Studio</p>
          <h1>Welcome back.</h1>
          <p class="lede">
            Log in to see your profile, refresh sessions, and keep tokens tidy.
          </p>
          <div class="pill-row">
            <span class="pill">API Base</span>
            <span class="pill mono">Same origin</span>
          </div>
          <div class="info-grid">
            <div>
              <p class="label">Login Endpoint</p>
              <p class="value">/api/auth/login</p>
            </div>
            <div>
              <p class="label">Profile Endpoint</p>
              <p class="value">/api/auth/get-me</p>
            </div>
          </div>
        </div>

        <div class="card">
          <h2>Sign in</h2>
          <p class="muted">Use your email and password.</p>
          <form id="login-form" class="stack">
            <input name="email" type="email" placeholder="Email" required />
            <input name="password" type="password" placeholder="Password" required />
            <button type="submit">Login</button>
          </form>
          <div class="helper">
            <span>New here?</span>
            <a href="./signup.html">Create an account</a>
          </div>
        </div>
      </section>
    </main>

    <div id="toast" class="toast" aria-live="polite"></div>
    <script src="./app.js"></script>
  </body>
</html>
